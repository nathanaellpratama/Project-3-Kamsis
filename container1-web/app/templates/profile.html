{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="profile-container" id="profile-page">
    <div class="profile-card">
        <div class="profile-header">
            <span class="profile-icon">&#128100;</span>
            <h1>Profil Pengguna</h1>
        </div>
        <div class="profile-info">
            <div class="info-row"><label>Username:</label><span>{{ current_user.username }}</span></div>
            <div class="info-row"><label>Email:</label><span>{{ current_user.email }}</span></div>
            <div class="info-row"><label>Bergabung:</label><span>{{ current_user.created_at.strftime('%d %B %Y') }}</span></div>
        </div>
        <hr>
        <h2>Edit Profil</h2>
        <form method="POST" action="{{ url_for('main.profile') }}" id="profile-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="full_name">Nama Lengkap</label>
                <input type="text" id="full_name" name="full_name" maxlength="100" value="{{ current_user.full_name or '' }}">
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" maxlength="500" rows="3">{{ current_user.bio or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="btn-update">Simpan</button>
        </form>
    </div>
</div>
{% endblock %}
