{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container" id="login-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">&#128274;</span>
            <h1>Login</h1>
            <p>Masuk ke akun Anda</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="login-form">
            <!-- CSRF Token (prevents CSRF attacks) -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       required 
                       maxlength="50"
                       autocomplete="username"
                       placeholder="Masukkan username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       required 
                       maxlength="128"
                       autocomplete="current-password"
                       placeholder="Masukkan password">
            </div>

            <button type="submit" class="btn btn-primary" id="btn-login">
                &#128274; Login
            </button>
        </form>

        <div class="auth-footer">
            <p>Belum punya akun? <a href="{{ url_for('auth.register') }}">Register</a></p>
        </div>

        <div class="security-badge">
            <small>&#128272; Password dilindungi dengan Hash + Salt (PBKDF2-SHA256)</small>
        </div>
    </div>
</div>
{% endblock %}
