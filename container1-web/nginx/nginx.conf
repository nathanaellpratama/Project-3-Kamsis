# ============================================
# Nginx Configuration - HTTPS Reverse Proxy
# Proteksi: HTTPS/TLS, Buffer Overflow, Headers
# ============================================

# Limit request rate (anti DoS/brute force)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/s;

# Limit connection count
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ---- SSL Configuration ----
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Buffer Overflow Protection ----
    # Limit request body size (max 1MB)
    client_max_body_size 1m;

    # Limit buffer sizes to prevent overflow
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Timeout settings
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # ---- Security Headers ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Hide server version ----
    server_tokens off;

    # ---- Rate Limiting ----
    # General pages
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 20;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy buffer limits
        proxy_buffer_size 8k;
        proxy_buffers 4 8k;
        proxy_busy_buffers_size 16k;
    }

    # Login/Register - stricter rate limit
    location ~ ^/(login|register) {
        limit_req zone=login burst=5 nodelay;
        limit_conn addr 5;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /app/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block common attack paths
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 403;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Custom error pages
    error_page 413 /413.html;
    location = /413.html {
        return 413 '{"error": "Request entity too large. Maximum allowed size is 1MB."}';
        add_header Content-Type application/json;
    }

    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error": "Too many requests. Please slow down."}';
        add_header Content-Type application/json;
    }
}
