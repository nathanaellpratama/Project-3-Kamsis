[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log
priority=10

[program:gunicorn]
command=gunicorn --bind 127.0.0.1:8000 --workers 2 --timeout 120 --access-logfile - --error-logfile - app:create_app()
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/gunicorn_err.log
stdout_logfile=/var/log/supervisor/gunicorn_out.log
user=appuser
priority=20

[program:postgresql]
command=su - postgres -c "postgres -D /var/lib/postgresql/%(ENV_PG_VERSION)s/main"
autostart=false
autorestart=false
priority=1
